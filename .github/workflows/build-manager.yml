name: Build Manager

on:
  workflow_dispatch:
  push:
    branches: [ "main", "dev", "ci", "sync-upstream" ]
    paths:
      - '.github/workflows/build-manager.yml'
      - '.github/workflows/build-lkm.yml'
      - '.github/workflows/ddk-lkm.yml'
      - '.github/workflows/ksud.yml'
      - 'manager/**'
      - 'kernel/**'
      - 'userspace/**'
      - 'scripts/ksubot.py'
  pull_request:
  workflow_call:

jobs:
  generate-key:
    runs-on: ubuntu-latest
    outputs:
      expected_size: ${{ steps.extract.outputs.expected_size }}
      expected_hash: ${{ steps.extract.outputs.expected_hash }}
      keystore: ${{ steps.gen.outputs.keystore }}
      keystore_password: ${{ steps.gen.outputs.keystore_password }}
      key_password: ${{ steps.gen.outputs.key_password }}
    steps:
      - name: Generate temporary keystore
        if: github.event_name == 'pull_request'
        id: gen
        run: |
          KEYSTORE_PASSWORD=$(openssl rand -hex 32)
          KEY_PASSWORD=$(openssl rand -hex 32)
          echo "keystore_password=$KEYSTORE_PASSWORD" >> $GITHUB_OUTPUT
          echo "key_password=$KEY_PASSWORD" >> $GITHUB_OUTPUT

          keytool -genkeypair \
            -alias pr-key \
            -keyalg RSA -keysize 2048 \
            -validity 1 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=KernelSU PR Build" \
            -storetype JKS \
            -keystore pr-key.jks

          echo "keystore=$(base64 -w 0 pr-key.jks)" >> $GITHUB_OUTPUT

      - name: Extract certificate hash and size
        if: github.event_name == 'pull_request'
        id: extract
        env:
          STORE_PASS: ${{ steps.gen.outputs.keystore_password }}
        run: |
          # Export DER certificate
          keytool -exportcert \
            -alias pr-key \
            -keystore pr-key.jks \
            -storepass "$STORE_PASS" \
            -file pr-cert.der

          # Calculate size in hex
          SIZE_DEC=$(stat -c%s pr-cert.der)
          SIZE_HEX=$(printf '0x%04x' "$SIZE_DEC")
          echo "expected_size=$SIZE_HEX" >> $GITHUB_OUTPUT

          # Calculate SHA256 hash
          HASH=$(sha256sum pr-cert.der | awk '{print $1}')
          echo "expected_hash=$HASH" >> $GITHUB_OUTPUT

          echo "Certificate size: $SIZE_HEX ($SIZE_DEC bytes)"
          echo "Certificate hash: $HASH"

  build-lkm:
    needs: generate-key
    uses: ./.github/workflows/build-lkm.yml
    with:
      expected_pr_build_size: ${{ needs.generate-key.outputs.expected_size || '' }}
      expected_pr_build_hash: ${{ needs.generate-key.outputs.expected_hash || '' }}
    secrets: inherit

  build-ksuinit:
    uses: ./.github/workflows/ksuinit.yml

  build-ksud:
    needs: [build-lkm, build-ksuinit]
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            os: ubuntu-latest
          - target: x86_64-linux-android
            os: ubuntu-latest
          - target: armv7-linux-androideabi
            os: ubuntu-latest
    uses: ./.github/workflows/ksud.yml
    with:
      target: ${{ matrix.target }}
      os: ${{ matrix.os }}

  build-manager:
    needs: [generate-key]
    runs-on: ubuntu-latest
    if: always() && needs.generate-key.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - manager_type: "spoofed"
            build_type: "release"

          - manager_type: "normal"
            build_type: "release"
          - manager_type: "normal"
            build_type: "debug"
    defaults:
      run:
        working-directory: ./manager

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine commit for build
        id: commit
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            echo "COMMIT_SHA=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine manager variant
        id: determine
        run: |
          if [ "${{ matrix.manager_type }}" == "spoofed" ]; then
            echo "title=Spoofed-Manager" >> $GITHUB_OUTPUT
          else
            echo "title=Manager" >> $GITHUB_OUTPUT
          fi

      - name: Run randomizer
        if: ${{ matrix.manager_type == 'spoofed' }}
        run: |
          chmod +x randomizer
          ./randomizer

      - name: Write key
        if: ${{ github.event_name == 'workflow_dispatch' || ( github.event_name != 'pull_request') || github.ref_type == 'tag' }}
        run: |
          if [ ! -z "${{ secrets.KEYSTORE }}" ]; then
            {
              echo KEYSTORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}'
              echo KEY_ALIAS='${{ secrets.KEY_ALIAS }}'
              echo KEY_PASSWORD='${{ secrets.KEY_PASSWORD }}'
              echo KEYSTORE_FILE='key.jks'
            } >> gradle.properties
            echo "${{ secrets.KEYSTORE }}" | base64 -d > key.jks
          fi

      - name: Write PR key
        if: github.event_name == 'pull_request'
        env:
          PR_KEYSTORE: ${{ needs.generate-key.outputs.keystore }}
          PR_KEYSTORE_PASSWORD: ${{ needs.generate-key.outputs.keystore_password }}
          PR_KEY_PASSWORD: ${{ needs.generate-key.outputs.key_password }}
        run: |
          echo "$PR_KEYSTORE" | base64 -d > pr-key.jks
          {
            echo KEYSTORE_PASSWORD="$PR_KEYSTORE_PASSWORD"
            echo KEY_ALIAS='pr-key'
            echo KEY_PASSWORD="$PR_KEY_PASSWORD"
            echo KEYSTORE_FILE='pr-key.jks'
          } >> gradle.properties
      
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Build APK
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            ./gradlew assemble${{ matrix.build_type }} -Pcommit=${{ steps.commit.outputs.COMMIT_SHA }} -PIS_PR_BUILD=true
          else
            ./gradlew assemble${{ matrix.build_type }} -Pcommit=${{ steps.commit.outputs.COMMIT_SHA }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.determine.outputs.title }}-gradle-${{ matrix.build_type }}
          path: |
            manager/app/build/outputs/apk/release/*.apk
            manager/app/build/outputs/apk/debug/*.apk

      - name: Upload mappings
        uses: actions/upload-artifact@v7
        with:
          name: "${{ steps.determine.outputs.title }}-mappings"
          path: "manager/app/build/outputs/mapping/release/"
          if-no-files-found: ignore

  repack-manager:
    if: always() && needs.build-manager.result == 'success' && needs.build-ksud.result == 'success'
    needs: [build-manager, build-ksud, generate-key]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - manager_type: "spoofed"
            build_type: "release"
          - manager_type: "normal"
            build_type: "release"
          - manager_type: "normal"
            build_type: "debug"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine manager variant
        id: determine
        run: |
          if [ "${{ matrix.manager_type }}" == "spoofed" ]; then
            echo "title=Spoofed-Manager" >> $GITHUB_OUTPUT
          else
            echo "title=Manager" >> $GITHUB_OUTPUT
          fi

      - name: Download gradle artifact (with retries)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: ${{ steps.determine.outputs.title }}-gradle-${{ matrix.build_type }}
          TARGET_DIR: artifacts/${{ steps.determine.outputs.title }}-gradle-${{ matrix.build_type }}
        run: |
          set -euo pipefail
          mkdir -p "$TARGET_DIR"
          sudo apt-get update -y
          sudo apt-get install -y jq unzip curl
          API="https://api.github.com/repos/${{ github.repository }}/actions/artifacts"
          for attempt in 1 2 3; do
            echo "Attempt $attempt to find/download artifact $ARTIFACT_NAME"
            ART_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$API" | jq -r --arg NAME "$ARTIFACT_NAME" '.artifacts[] | select(.name == $NAME) | .id' || true)
            if [ -n "$ART_ID" ] && [ "$ART_ID" != "null" ]; then
              DOWNLOAD_URL="https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ART_ID/zip"
              echo "Found artifact id $ART_ID, downloading..."
              curl -L -H "Authorization: token $GITHUB_TOKEN" --retry 3 --retry-delay 3 -o /tmp/artifact.zip "$DOWNLOAD_URL"
              unzip -q /tmp/artifact.zip -d "$TARGET_DIR" && rm -f /tmp/artifact.zip
              if [ "$(find "$TARGET_DIR" -type f | wc -l)" -gt 0 ]; then
                echo "Artifact downloaded and extracted to $TARGET_DIR"
                break
              else
                echo "Download succeeded but no files extracted, retrying..."
              fi
            else
              echo "Artifact not found (attempt $attempt), retrying..."
            fi
            sleep 5
            if [ $attempt -eq 3 ]; then
              echo "ERROR: Failed to download artifact $ARTIFACT_NAME after 3 attempts"
              exit 1
            fi
          done

      - name: Download arm64 ksud (with retries)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: ksud-aarch64-linux-android
          TARGET_DIR: artifacts/ksud-aarch64-linux-android
        run: |
          set -euo pipefail
          mkdir -p "$TARGET_DIR"
          sudo apt-get update -y
          sudo apt-get install -y jq unzip curl
          API="https://api.github.com/repos/${{ github.repository }}/actions/artifacts"
          for attempt in 1 2 3; do
            ART_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$API" | jq -r --arg NAME "$ARTIFACT_NAME" '.artifacts[] | select(.name == $NAME) | .id' || true)
            if [ -n "$ART_ID" ] && [ "$ART_ID" != "null" ]; then
              DOWNLOAD_URL="https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ART_ID/zip"
              curl -L -H "Authorization: token $GITHUB_TOKEN" --retry 3 --retry-delay 3 -o /tmp/artifact.zip "$DOWNLOAD_URL"
              unzip -q /tmp/artifact.zip -d "$TARGET_DIR" && rm -f /tmp/artifact.zip
              if [ "$(find "$TARGET_DIR" -type f | wc -l)" -gt 0 ]; then
                echo "Artifact downloaded and extracted to $TARGET_DIR"
                break
              fi
            fi
            sleep 2
            if [ $attempt -eq 3 ]; then
              echo "ERROR: Failed to download artifact $ARTIFACT_NAME after 3 attempts"
              exit 1
            fi
          done

      - name: Download x86_64 ksud (with retries)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: ksud-x86_64-linux-android
          TARGET_DIR: artifacts/ksud-x86_64-linux-android
        run: |
          set -euo pipefail
          mkdir -p "$TARGET_DIR"
          sudo apt-get update -y
          sudo apt-get install -y jq unzip curl
          API="https://api.github.com/repos/${{ github.repository }}/actions/artifacts"
          for attempt in 1 2 3; do
            ART_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$API" | jq -r --arg NAME "$ARTIFACT_NAME" '.artifacts[] | select(.name == $NAME) | .id' || true)
            if [ -n "$ART_ID" ] && [ "$ART_ID" != "null" ]; then
              DOWNLOAD_URL="https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ART_ID/zip"
              curl -L -H "Authorization: token $GITHUB_TOKEN" --retry 3 --retry-delay 3 -o /tmp/artifact.zip "$DOWNLOAD_URL"
              unzip -q /tmp/artifact.zip -d "$TARGET_DIR" && rm -f /tmp/artifact.zip
              if [ "$(find "$TARGET_DIR" -type f | wc -l)" -gt 0 ]; then
                echo "Artifact downloaded and extracted to $TARGET_DIR"
                break
              fi
            fi
            sleep 2
            if [ $attempt -eq 3 ]; then
              echo "ERROR: Failed to download artifact $ARTIFACT_NAME after 3 attempts"
              exit 1
            fi
          done

      - name: Download arm ksud (with retries)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: ksud-armv7-linux-androideabi
          TARGET_DIR: artifacts/ksud-armv7-linux-androideabi
        run: |
          set -euo pipefail
          mkdir -p "$TARGET_DIR"
          sudo apt-get update -y
          sudo apt-get install -y jq unzip curl
          API="https://api.github.com/repos/${{ github.repository }}/actions/artifacts"
          for attempt in 1 2 3; do
            ART_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$API" | jq -r --arg NAME "$ARTIFACT_NAME" '.artifacts[] | select(.name == $NAME) | .id' || true)
            if [ -n "$ART_ID" ] && [ "$ART_ID" != "null" ]; then
              DOWNLOAD_URL="https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ART_ID/zip"
              curl -L -H "Authorization: token $GITHUB_TOKEN" --retry 3 --retry-delay 3 -o /tmp/artifact.zip "$DOWNLOAD_URL"
              unzip -q /tmp/artifact.zip -d "$TARGET_DIR" && rm -f /tmp/artifact.zip
              if [ "$(find "$TARGET_DIR" -type f | wc -l)" -gt 0 ]; then
                echo "Artifact downloaded and extracted to $TARGET_DIR"
                break
              fi
            fi
            sleep 2
            if [ $attempt -eq 3 ]; then
              echo "ERROR: Failed to download artifact $ARTIFACT_NAME after 3 attempts"
              exit 1
            fi
          done

      - name: Place manager apk and ksud artifacts
        run: |
          set -euo pipefail
          mkdir -p manager/app/build/outputs/apk/${{ matrix.build_type }}
          APKS=$(find artifacts/${{ steps.determine.outputs.title }}-gradle-${{ matrix.build_type }} -type f -name "*.apk" || true)
          if [ -z "$APKS" ]; then
            echo "ERROR: No APKs found in artifacts/${{ steps.determine.outputs.title }}-gradle-${{ matrix.build_type }}. Previous artifact download likely failed."
            ls -la artifacts || true
            exit 1
          fi
          APKS=$(echo "$APKS" | tr '\n' ' ')
          cp -f $APKS manager/app/build/outputs/apk/${{ matrix.build_type }}/

          mkdir -p target/aarch64-linux-android/release
          mkdir -p target/armv7-linux-androideabi/release
          mkdir -p target/x86_64-linux-android/release
          ARM64_KSUD=$(find artifacts/ksud-aarch64-linux-android -type f -name ksud | head -n 1 || true)
          ARMV7_KSUD=$(find artifacts/ksud-armv7-linux-androideabi -type f -name ksud | head -n 1 || true)
          X86_64_KSUD=$(find artifacts/ksud-x86_64-linux-android -type f -name ksud | head -n 1 || true)
          if [ -z "$ARM64_KSUD" ] || [ -z "$ARMV7_KSUD" ] || [ -z "$X86_64_KSUD" ]; then
            echo "ERROR: One or more ksud binaries were not found. Check earlier artifact downloads."
            ls -la artifacts || true
            exit 1
          fi
          cp -f "$ARM64_KSUD" target/aarch64-linux-android/release/ksud
          cp -f "$ARMV7_KSUD" target/armv7-linux-androideabi/release/ksud
          cp -f "$X86_64_KSUD" target/x86_64-linux-android/release/ksud

      - name: Prepare signing inputs
        if: ${{ github.event_name == 'pull_request' || (github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/ci' || github.ref == 'refs/heads/sync-upstream')) }}
        env:
          PR_KEYSTORE: ${{ needs.generate-key.outputs.keystore }}
          PR_KEYSTORE_PASSWORD: ${{ needs.generate-key.outputs.keystore_password }}
          PR_KEY_PASSWORD: ${{ needs.generate-key.outputs.key_password }}
          PROD_KEYSTORE: ${{ secrets.KEYSTORE }}
          PROD_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          PROD_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          PROD_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "$PR_KEYSTORE" | base64 -d > pr-key.jks
            echo "SIGN_KEYSTORE_FILE=pr-key.jks" >> $GITHUB_ENV
            echo "SIGN_KEY_ALIAS=pr-key" >> $GITHUB_ENV
            echo "SIGN_KEYSTORE_PASSWORD=$PR_KEYSTORE_PASSWORD" >> $GITHUB_ENV
            echo "SIGN_KEY_PASSWORD=$PR_KEY_PASSWORD" >> $GITHUB_ENV
          else
            # Ensure production secrets exist and fail with helpful message if not
            if [ -z "${PROD_KEYSTORE:-}" ] || [ -z "${PROD_KEY_ALIAS:-}" ] || [ -z "${PROD_KEYSTORE_PASSWORD:-}" ] || [ -z "${PROD_KEY_PASSWORD:-}" ]; then
              echo "ERROR: Production signing secrets are missing. Please set repository secrets: KEYSTORE, KEY_ALIAS, KEYSTORE_PASSWORD, KEY_PASSWORD."
              exit 1
            fi
            echo "$PROD_KEYSTORE" | base64 -d > key.jks
            echo "SIGN_KEYSTORE_FILE=key.jks" >> $GITHUB_ENV
            echo "SIGN_KEY_ALIAS=$PROD_KEY_ALIAS" >> $GITHUB_ENV
            echo "SIGN_KEYSTORE_PASSWORD=$PROD_KEYSTORE_PASSWORD" >> $GITHUB_ENV
            echo "SIGN_KEY_PASSWORD=$PROD_KEY_PASSWORD" >> $GITHUB_ENV
          fi

      - name: Repack and resign
        if: ${{ github.event_name == 'pull_request' || (github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/ci' || github.ref == 'refs/heads/sync-upstream')) }}
        run: |
          python3 repack_apk_multi.py repack \
            -b ${{ matrix.build_type }} \
            -t release \
            -a arm64-v8a \
            -a armeabi-v7a \
            -a x86_64 \
            -K "$SIGN_KEYSTORE_FILE" \
            -A "$SIGN_KEY_ALIAS" \
            -P "$SIGN_KEYSTORE_PASSWORD" \
            -S "$SIGN_KEY_PASSWORD" \
            --strip

      - name: Delete gradle build
        uses: GeekyEggo/delete-artifact@v6
        with:
          name: ${{ steps.determine.outputs.title }}-gradle-${{ matrix.build_type }}
        
      - name: Upload build artifact
        if: ${{ github.event_name == 'pull_request' || (github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/ci' || github.ref == 'refs/heads/sync-upstream')) }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.determine.outputs.title }}-${{ matrix.build_type }}
          path: dist/*.apk

  upload-telegram:
    needs: repack-manager
    if: github.event_name != 'pull_request' 
    runs-on: ubuntu-latest
    strategy:
      matrix:
        manager_type: [ "spoofed", "normal" ]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup need_upload
        id: need_upload
        run: |
          if [ ! -z "${{ secrets.BOT_TOKEN }} }" ]; then
            echo "UPLOAD=true" >> $GITHUB_OUTPUT
          else
            echo "UPLOAD=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine manager variant
        id: determine
        run: |
          if [ "${{ matrix.manager_type }}" == "spoofed" ]; then
            echo "title=Spoofed-Manager" >> $GITHUB_OUTPUT
            echo "topicid=${{ vars.MESSAGE_SPOOFED_THREAD_ID }}" >> $GITHUB_OUTPUT
          else
            echo "title=Manager" >> $GITHUB_OUTPUT
            echo "topicid=${{ vars.MESSAGE_THREAD_ID }}" >> $GITHUB_OUTPUT
          fi

          if [[ "${{ github.ref }}" != "refs/heads/main" && "${{ github.ref_type }}" != "tag" ]]; then
            echo "topicid=${{ vars.MESSAGE_DEVELOPING_MANAGER_THREAD_ID }}" >> $GITHUB_OUTPUT
          fi
        
      - name: Download Debug artifact
        if: ${{ matrix.manager_type != 'spoofed' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ steps.determine.outputs.title }}-debug
          path: ./apk/debug

      - name: Download Release artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ steps.determine.outputs.title }}-release
          path: ./apk/release

      - name: Upload to Telegram
        if: steps.need_upload.outputs.UPLOAD == 'true'
        env:
          CHAT_ID: ${{ vars.CHAT_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MESSAGE_THREAD_ID: ${{ steps.determine.outputs.topicid }}
          DEVELOPING_THREAD_ID: ${{ vars.MESSAGE_DEVELOPING_MANAGER_THREAD_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TITLE: ${{ steps.determine.outputs.title }}
          BRANCH: ${{ github.ref_name }}
        run: |
          pip3 install python-telegram-bot
          export VERSION=$(git rev-list --count HEAD)
          if [ ! "${{ matrix.manager_type }}" == "spoofed" ]; then
            APK_DEBUG=apk/debug/*.apk
          else
            APK_DEBUG=""
          fi
          APK_RELEASE=apk/release/*.apk
          python3 $GITHUB_WORKSPACE/scripts/ksubot.py $APK_DEBUG $APK_RELEASE
